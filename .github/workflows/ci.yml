name: CI - Quality Gate Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Lint All Workspaces
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (Root)
        run: npx eslint . --max-warnings=0
        continue-on-error: false

  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest (Frontend)
        run: npm run test:run -w frontend

  backend-tests:
    name: Backend Tests (Jest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject Dummy Env Vars (Sandbox Mode)
        run: |
          echo "JWT_SECRET=dummy_secret_2025" >> $GITHUB_ENV
          echo "NODE_ENV=test" >> $GITHUB_ENV
          echo "DB_STORAGE=./database.sqlite" >> $GITHUB_ENV

      - name: Run Jest (Backend)
        run: npm run test -w backend