name: CI - Quality Gate Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Lint All Workspaces
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (Root)
        run: npx eslint . --max-warnings=0
        continue-on-error: false

  security:
    name: Security Audit (npm audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # No bloquea el pipeline todavía: reporta vulnerabilidades para su
      # seguimiento. Subir audit-level / quitar continue-on-error cuando se
      # haya saneado el árbol de dependencias.
      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest (Frontend)
        run: npm run test:run -w frontend

  backend-tests:
    name: Backend Tests (Jest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject Dummy Env Vars (Sandbox Mode)
        run: |
          echo "JWT_SECRET=dummy_secret_ci_only" >> $GITHUB_ENV
          echo "NODE_ENV=test" >> $GITHUB_ENV
          echo "DB_STORAGE=./database.sqlite" >> $GITHUB_ENV
          echo "BCRYPT_ROUNDS=1" >> $GITHUB_ENV
          echo "JWT_EXPIRES_IN=1h" >> $GITHUB_ENV
          echo "FRONTEND_URL=http://localhost:5000" >> $GITHUB_ENV

      - name: Run Jest (Backend) with coverage
        run: npm run test:coverage -w backend

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          if-no-files-found: ignore